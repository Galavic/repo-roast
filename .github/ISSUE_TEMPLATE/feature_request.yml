name: Feature request
description: Suggest a new check, output format, or workflow.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What repository launch problem should this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the check or behavior you want.
    validations:
      required: true
