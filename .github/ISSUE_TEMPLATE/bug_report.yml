name: Bug report
description: Report something that is broken or misleading.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include the command you ran and the output you saw.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Repo Roast version
      placeholder: "0.1.0"
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.x"
